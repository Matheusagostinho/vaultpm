name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Build a release binary for every supported target.
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.target }}"
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/vault${ext}" "dist/${{ matrix.target }}/"
          cp "target/${{ matrix.target }}/release/vt${ext}" "dist/${{ matrix.target }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}

  # 2. Publish GitHub Release tarballs (used by install.sh).
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package tarballs
        run: |
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          mkdir -p release
          for dir in artifacts/*/; do
            target="$(basename "$dir")"
            case "$target" in
              *windows*) (cd "$dir" && zip -q "../../release/vault-${tag}-${target}.zip" vault.exe vt.exe) ;;
              *) tar -czf "release/vault-${tag}-${target}.tar.gz" -C "$dir" vault vt ;;
            esac
          done
          (cd release && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  # 3. Publish npm packages (main + per-platform).
  npm-publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble platform packages
        run: node npm/scripts/build-npm-packages.mjs artifacts
      - name: Publish platform packages
        run: |
          for dir in npm/platforms/*/; do
            (cd "$dir" && npm publish --access public)
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
